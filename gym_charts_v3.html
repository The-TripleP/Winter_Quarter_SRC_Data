<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym Occupancy — Winter Quarter</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0e14;
    --surface: #13181f;
    --surface2: #1b222d;
    --border: #252d38;
    --accent: #00e5ff;
    --accent2: #ff4d6d;
    --accent3: #ffd600;
    --text: #e8edf5;
    --muted: #6b7a8f;
    --bar: #00e5ff;
    --bar-avg: #ff4d6d;
    --bar-meta: #a78bfa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    gap: 16px;
    flex-wrap: wrap;
  }
  .logo { font-family: 'Space Mono', monospace; font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; white-space: nowrap; }
  .logo span { color: var(--muted); font-weight: 400; font-size: 13px; margin-left: 10px; }
  .controls { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .mode-tabs { display: flex; gap: 4px; background: var(--bg); padding: 4px; border-radius: 8px; border: 1px solid var(--border); }
  .tab { padding: 7px 16px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; background: transparent; color: var(--muted); transition: all 0.15s; font-family: 'DM Sans', sans-serif; white-space: nowrap; }
  .tab.active { background: var(--accent); color: #000; font-weight: 600; }
  .tab:hover:not(.active) { color: var(--text); background: var(--surface2); }
  select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 6px; font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; outline: none; min-width: 200px; }
  select:focus { border-color: var(--accent); }

  .main { padding: 28px 32px; }
  .section-title { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 20px; }
  .section-title .highlight { color: var(--accent); }
  .section-title .highlight2 { color: var(--accent2); }
  .section-title .highlight3 { color: var(--bar-meta); }

  .view-panel { display: none; }
  .view-panel.active { display: block; }

  /* Date Charts Grid */
  .charts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 16px; }
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; transition: border-color 0.2s; }
  .chart-card:hover { border-color: var(--accent); }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
  .card-date { font-family: 'Space Mono', monospace; font-size: 17px; font-weight: 700; color: var(--text); }
  .card-day { font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 3px; }
  .card-stat { text-align: right; font-size: 12px; color: var(--muted); }
  .card-stat strong { display: block; font-family: 'Space Mono', monospace; font-size: 20px; color: var(--accent3); font-weight: 700; }
  .chart-wrap { position: relative; height: 150px; }

  /* Day Average Charts */
  .day-avg-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(500px, 1fr)); gap: 16px; }
  .day-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; transition: border-color 0.2s; }
  .day-card:hover { border-color: var(--bar-avg); }
  .day-name { font-family: 'Space Mono', monospace; font-size: 15px; font-weight: 700; color: var(--bar-avg); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
  .day-meta { font-size: 12px; color: var(--muted); margin-bottom: 14px; }
  .day-chart-wrap { position: relative; height: 180px; }

  /* Stats/Meta Panel */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 8px; font-family: 'Space Mono', monospace; }
  .stat-value { font-family: 'Space Mono', monospace; font-size: 28px; font-weight: 700; color: var(--accent3); }
  .stat-sub { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .stat-value.green { color: #4ade80; }
  .stat-value.purple { color: var(--bar-meta); }
  .stat-value.red { color: var(--accent2); }

  /* Max Pct Table */
  .pct-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
  .pct-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; display: flex; align-items: center; gap: 14px; }
  .pct-card:hover { border-color: var(--bar-meta); }
  .pct-name { flex: 1; font-size: 13px; font-weight: 500; color: var(--text); }
  .pct-bar-wrap { flex: 1.5; background: var(--surface2); border-radius: 4px; height: 8px; overflow: hidden; }
  .pct-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--bar-meta), var(--accent2)); }
  .pct-val { font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; color: var(--bar-meta); min-width: 52px; text-align: right; }

  /* Interval Table */
  .interval-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; margin-top: 16px; }
  .interval-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; }
  .interval-name { font-size: 13px; color: var(--text); }
  .interval-val { font-family: 'Space Mono', monospace; font-size: 14px; font-weight: 700; color: var(--accent); }

  .empty-state { color: var(--muted); font-size: 14px; padding: 40px; text-align: center; }
  .sub-section-title { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin: 24px 0 12px; }
</style>
</head>
<body>

<header>
  <div class="logo">GYM OCCUPANCY <span>Winter Quarter</span></div>
  <div class="controls">
    <div class="mode-tabs">
      <button class="tab active" data-mode="dates">By Date</button>
      <button class="tab" data-mode="days">By Day of Week</button>
      <button class="tab" data-mode="stats">Stats &amp; Meta</button>
    </div>
    <select id="machineSelect">
      <option value="__total__">All Locations (Total)</option>
    </select>
  </div>
</header>

<div class="main">
  <!-- DATES PANEL -->
  <div class="view-panel active" id="panel-dates">
    <div class="section-title">
      <span class="highlight" id="dateCount">—</span> dates with &gt;2 entries · <span id="machineLabel">All Locations</span>
    </div>
    <div class="charts-grid" id="dateChartsGrid"></div>
  </div>

  <!-- DAY AVG PANEL -->
  <div class="view-panel" id="panel-days">
    <div class="section-title">Average occupancy by <span class="highlight2">day of week</span></div>
    <div class="day-avg-grid" id="dayAvgGrid"></div>
  </div>

  <!-- STATS PANEL -->
  <div class="view-panel" id="panel-stats">
    <div class="section-title">Analytics &amp; <span class="highlight3">Meta</span></div>

    <div class="stats-grid" id="statsGrid"></div>

    <div class="sub-section-title">Max Occupancy % per Location</div>
    <div class="pct-grid" id="pctGrid"></div>

    <div class="sub-section-title">Average Recording Interval per Location</div>
    <div class="interval-grid" id="intervalGrid"></div>
  </div>
</div>

const DAY_ORDER = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const BAR_COLOR = 'rgba(0,229,255,0.75)';
const BAR_HOVER = 'rgba(0,229,255,1)';
const AVG_COLOR = 'rgba(255,77,109,0.75)';
const AVG_HOVER = 'rgba(255,77,109,1)';

let currentMachine = '__total__';
let currentMode = 'dates';

function destroyCharts(container) {
  container.querySelectorAll('canvas').forEach(c => {
    const chart = Chart.getChart(c);
    if (chart) chart.destroy();
  });
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: '2-digit' });
}

function makeBarChart(canvas, labels, data, color, hoverColor, yLabel) {
  return new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [{ data, backgroundColor: color, hoverBackgroundColor: hoverColor, borderRadius: 3, borderSkipped: false }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 300 },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1b222d', borderColor: '#252d38', borderWidth: 1,
          titleColor: '#e8edf5', bodyColor: '#e8edf5', padding: 10,
          callbacks: { label: ctx => ` ${ctx.parsed.y} people` }
        }
      },
      scales: {
        x: {
          ticks: { color: '#6b7a8f', font: { family: 'Space Mono', size: 9 }, maxRotation: 45, autoSkip: true, maxTicksLimit: 10 },
          grid: { color: '#1b222d' }, border: { color: '#252d38' }
        },
        y: {
          beginAtZero: true,
          ticks: { color: '#6b7a8f', font: { family: 'Space Mono', size: 9 }, maxTicksLimit: 5 },
          grid: { color: '#1b222d' }, border: { color: '#252d38' }
        }
      }
    }
  });
}

function renderDateCharts() {
  const grid = document.getElementById('dateChartsGrid');
  destroyCharts(grid);
  grid.innerHTML = '';

  const perDateData = currentMachine === '__total__'
    ? GYM_DATA.total_per_date
    : (GYM_DATA.sheets_per_date[currentMachine] || {});

  const dates = Object.keys(perDateData).sort();
  document.getElementById('dateCount').textContent = dates.length;

  if (dates.length === 0) {
    grid.innerHTML = '<div class="empty-state">No dates with more than 2 entries for this Location.</div>';
    return;
  }

  dates.forEach(dateStr => {
    const d = perDateData[dateStr];
    const maxCount = Math.max(...d.counts);
    const card = document.createElement('div');
    card.className = 'chart-card';
    card.innerHTML = `
      <div class="card-header">
        <div>
          <div class="card-date">${formatDate(dateStr)}</div>
          <div class="card-day">${d.day}</div>
        </div>
        <div class="card-stat">
          <strong>${maxCount}</strong>
          peak &middot; ${d.counts.length} readings
        </div>
      </div>
      <div class="chart-wrap"><canvas></canvas></div>
    `;
    grid.appendChild(card);
    makeBarChart(card.querySelector('canvas'), d.times, d.counts, BAR_COLOR, BAR_HOVER);
  });
}

function renderDayAvgCharts() {
  const grid = document.getElementById('dayAvgGrid');
  destroyCharts(grid);
  grid.innerHTML = '';

  const dayAvgData = currentMachine === '__total__'
    ? GYM_DATA.total_day_avg
    : (GYM_DATA.sheets_day_avg[currentMachine] || {});

  DAY_ORDER.forEach(day => {
    const d = dayAvgData[day];
    if (!d || d.times.length === 0) return;
    const avgPeak = Math.max(...d.counts);
    const avgMean = (d.counts.reduce((a, b) => a + b, 0) / d.counts.length).toFixed(1);
    const card = document.createElement('div');
    card.className = 'day-card';
    card.innerHTML = `
      <div class="day-name">${day}</div>
      <div class="day-meta">peak: ${avgPeak} &middot; mean: ${avgMean} &middot; ${d.times.length} time slots</div>
      <div class="day-chart-wrap"><canvas></canvas></div>
    `;
    grid.appendChild(card);
    makeBarChart(card.querySelector('canvas'), d.times, d.counts, AVG_COLOR, AVG_HOVER);
  });

  if (grid.children.length === 0) {
    grid.innerHTML = '<div class="empty-state">No day-of-week data for this selection.</div>';
  }
}

function renderStats() {
  const meta = GYM_DATA.meta;
  const statsGrid = document.getElementById('statsGrid');
  statsGrid.innerHTML = '';

  const stats = [
    { label: 'Earliest Recording', value: meta.overall_earliest, cls: '', sub: 'Earliest time any data was recorded across all dates' },
    { label: 'Latest Recording', value: meta.overall_latest, cls: 'red', sub: 'Latest time any data was recorded across all dates' },
    { label: 'Avg Interval Between Readings', value: meta.overall_avg_interval + ' min', cls: 'purple', sub: 'Across all locations & dates' },
    { label: 'Total Dates Tracked', value: Object.keys(GYM_DATA.total_per_date).length, cls: '', sub: 'Dates with more than 2 entries' },
  ];

  stats.forEach(s => {
    const card = document.createElement('div');
    card.className = 'stat-card';
    card.innerHTML = `<div class="stat-label">${s.label}</div><div class="stat-value ${s.cls}">${s.value}</div><div class="stat-sub">${s.sub}</div>`;
    statsGrid.appendChild(card);
  });

  // Pct grid
  const pctGrid = document.getElementById('pctGrid');
  pctGrid.innerHTML = '';
  const pcts = Object.entries(meta.max_pct_per_sheet).sort((a, b) => b[1] - a[1]);
  const maxPct = pcts[0][1] || 100;
  pcts.forEach(([name, pct]) => {
    const card = document.createElement('div');
    card.className = 'pct-card';
    const fillW = Math.min((pct / maxPct) * 100, 100).toFixed(1);
    card.innerHTML = `
      <div class="pct-name">${name}</div>
      <div class="pct-bar-wrap"><div class="pct-bar-fill" style="width:${fillW}%"></div></div>
      <div class="pct-val">${pct}%</div>
    `;
    pctGrid.appendChild(card);
  });

  // Interval grid
  const intervalGrid = document.getElementById('intervalGrid');
  intervalGrid.innerHTML = '';
  Object.entries(meta.avg_interval_minutes).sort((a,b) => (a[1]||999)-(b[1]||999)).forEach(([name, val]) => {
    const card = document.createElement('div');
    card.className = 'interval-card';
    card.innerHTML = `<div class="interval-name">${name}</div><div class="interval-val">${val !== null ? val + ' min' : 'N/A'}</div>`;
    intervalGrid.appendChild(card);
  });
}

function render() {
  if (currentMode === 'dates') renderDateCharts();
  else if (currentMode === 'days') renderDayAvgCharts();
  else renderStats();
}

// Populate machine select
const sel = document.getElementById('machineSelect');
GYM_DATA.sheet_names.forEach(name => {
  const opt = document.createElement('option');
  opt.value = name;
  opt.textContent = name;
  sel.appendChild(opt);
});

sel.addEventListener('change', () => {
  currentMachine = sel.value;
  document.getElementById('machineLabel').textContent = currentMachine === '__total__' ? 'All Machines' : currentMachine;
  render();
});

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentMode = tab.dataset.mode;
    document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + currentMode).classList.add('active');
    render();
  });
});

render();
</script>
</body>
</html>
